version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: swag
      POSTGRES_PASSWORD: swag_secret
      POSTGRES_DB: swag_gold
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swag -d swag_gold"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://swag:swag_secret@db:5432/swag_gold
      SECRET_KEY: change-me-at-least-32-chars-long-in-production
      ACCESS_TOKEN_EXPIRE_MINUTES: 480
      ALGORITHM: HS256
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ../frontend:/app/frontend:ro
    command: >
      sh -c "python seed.py && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  pgdata:
